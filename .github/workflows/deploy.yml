name: Deploy Flask to EKS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check AWS identity (debug)
        run: |
          echo "👤 AWS Identity:"
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY

      - name: Build Docker image
        run: |
          docker buildx create --use || true
          docker buildx build --platform linux/amd64 -t flask-eks-app --load ./app

      - name: Tag & Push to ECR
        run: |
          docker tag flask-eks-app:latest $ECR_REPOSITORY:latest
          docker push $ECR_REPOSITORY:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.29.0

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name flask-eks-eks

      - name: Debug kubeconfig and context
        run: |
          echo "📄 kubeconfig content:"
          cat ~/.kube/config || echo "⚠️ No kubeconfig file found"
          echo "🔍 Current context:"
          kubectl config current-context || echo "⚠️ No context set"

      - name: Validate cluster access
        run: |
          kubectl version || true
          kubectl cluster-info || true
          kubectl get nodes

      - name: Install helm & helmfile
        run: |
          # Install Helm
          curl -LO https://get.helm.sh/helm-v3.14.0-linux-amd64.tar.gz
          tar -zxvf helm-v3.14.0-linux-amd64.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

          # Install Helmfile (binary)
          HELMFILE_VERSION=$(curl -s https://api.github.com/repos/helmfile/helmfile/releases/latest | jq -r .tag_name)
          curl -LO https://github.com/helmfile/helmfile/releases/download/${HELMFILE_VERSION}/helmfile_linux_amd64
          chmod +x helmfile_linux_amd64
          sudo mv helmfile_linux_amd64 /usr/local/bin/helmfile

          # Install helm-diff plugin
          helm plugin install https://github.com/databus23/helm-diff || true

      - name: Deploy to EKS using Helmfile
        run: |
          cd helm
          helmfile apply